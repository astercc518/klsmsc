global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'smsc-cluster'
    environment: 'development'

# 告警规则文件
rule_files:
  # - 'alerts.yml'

# 抓取配置
scrape_configs:
  # Prometheus自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API服务监控
  - job_name: 'smsc-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Worker监控
  - job_name: 'smsc-worker'
    static_configs:
      - targets: ['worker:9091']
    metrics_path: '/metrics'

  # MySQL监控 (需要mysql_exporter)
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']

  # Redis监控 (需要redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # RabbitMQ监控
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

