services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: smsc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sms_system}
      MYSQL_USER: ${MYSQL_USER:-smsuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smsc-network

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: smsc-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - smsc-network

  # RabbitMQ消息队列（使用非 guest 用户，避免远程连接被拒绝）
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smsc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
    ports:
      - "5672:5672"   # AMQP端口
      - "15672:15672" # 管理界面
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - smsc-network

  # Docker Socket 代理（仅开放容器重启权限，避免 API 容器直挂宿主机 Docker socket）
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: smsc-docker-proxy
    environment:
      CONTAINERS: 1
      POST: 1
      # 其余权限默认关闭（IMAGES/NETWORKS/VOLUMES/EXEC 等均为 0）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - smsc-network

  # API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-api
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_GROUP_ID: ${TELEGRAM_ADMIN_GROUP_ID:-}
      DLR_CALLBACK_OPEN: ${DLR_CALLBACK_OPEN:-false}
      DLR_CALLBACK_TOKEN: ${DLR_CALLBACK_TOKEN:-}
      DLR_CALLBACK_IP_WHITELIST: ${DLR_CALLBACK_IP_WHITELIST:-}
      TELEGRAM_STAFF_API_SECRET: ${TELEGRAM_STAFF_API_SECRET:-}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-https://www.kaolach.com}
      DOCKER_PROXY_URL: http://docker-proxy:2375
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
      - ./data/knowledge:/app/data/knowledge
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
      - ./.env:/app/.env.host
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - smsc-network

  # Celery Worker (短信发送)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
      DLR_PULL_HTTP_TIMEOUT_SECONDS: ${DLR_PULL_HTTP_TIMEOUT_SECONDS:-60}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q celery,sms_dlr,data_tasks,settlement_tasks
    restart: unless-stopped
    networks:
      - smsc-network

  # 专用短信发送 Worker（仅 sms_send，与数据/结算任务隔离）
  worker-sms:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker-sms
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      # submit_sm 等待 submit_sm_resp 最长时间（秒）；Compose 从项目根目录 .env 注入，见 SMPP_SUBMIT_RESP_WAIT_SECONDS
      SMPP_SUBMIT_RESP_WAIT_SECONDS: ${SMPP_SUBMIT_RESP_WAIT_SECONDS:-8}
      # 发送后保持 SMPP 连接秒数以便接收 deliver_sm（最大 86400；更久依赖 HTTP 拉取/回调）
      SMPP_DLR_SOCKET_HOLD_SECONDS: ${SMPP_DLR_SOCKET_HOLD_SECONDS:-300}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
      DLR_PULL_HTTP_TIMEOUT_SECONDS: ${DLR_PULL_HTTP_TIMEOUT_SECONDS:-60}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # 单进程：避免多进程同时 bind 同一 SMPP 账号（ESME 13），并允许延迟断线以接收 deliver_sm 送达回执
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 -Q sms_send
    restart: unless-stopped
    networks:
      - smsc-network

  # Celery Beat (定时任务调度)
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-beat
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    networks:
      - smsc-network

  # Telegram Bot
  bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: smsc-bot
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-kaolachbot}
      TELEGRAM_ADMIN_GROUP_ID: ${TELEGRAM_ADMIN_GROUP_ID:-}
      API_BASE_URL: http://api:8000
      TELEGRAM_STAFF_API_SECRET: ${TELEGRAM_STAFF_API_SECRET:-}
    volumes:
      - ./telegram_bot:/app
      - ./backend:/backend # 挂载 backend 代码以供复用
      - ./data/knowledge:/app/data/knowledge:ro # 业务知识附件供下载
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m bot.main
    restart: unless-stopped
    networks:
      - smsc-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smsc-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - smsc-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: smsc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - smsc-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: smsc-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - smsc-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  import_uploads:
    driver: local

networks:
  smsc-network:
    driver: bridge
