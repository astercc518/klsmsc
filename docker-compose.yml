x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: smsc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sms_system}
      MYSQL_USER: ${MYSQL_USER:-smsuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"   # MySQL：仅本机访问，外部用 SSH 隧道
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE --default-time-zone=+08:00 --max-connections=500 --range-optimizer-max-mem-size=67108864 --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-4G} --innodb-buffer-pool-instances=${INNODB_BUFFER_POOL_INSTANCES:-4} --innodb-log-buffer-size=${INNODB_LOG_BUFFER_SIZE:-64M}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 数据库连接池代理
  proxysql:
    image: proxysql/proxysql:2.6.3
    container_name: smsc-proxysql
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql
    ports:
      - "127.0.0.1:6033:6033"   # ProxySQL data：仅本机
      - "127.0.0.1:6032:6032"   # ProxySQL admin：仅本机（默认 admin/admin 高危！）
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # 全量 restart 后 MySQL 容器 IP 会变；须确认经 ProxySQL 能真正连上后端，再让 API 起，避免 502
    healthcheck:
      test: ["CMD", "sh", "-c", "mysql -h127.0.0.1 -P6033 -usmsuser -p$$MYSQL_PASSWORD -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Redis缓存（启用密码鉴权）
  redis:
    image: redis:7.0-alpine
    container_name: smsc-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # RabbitMQ消息队列（使用非 guest 用户，避免远程连接被拒绝）
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smsc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
    ports:
      - "127.0.0.1:5672:5672"     # AMQP：仅本机
      - "127.0.0.1:15672:15672"   # 管理界面：仅本机
      - "127.0.0.1:15692:15692"   # Prometheus 抓取：仅本机
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      # 启用 rabbitmq_prometheus，与 prometheus/prometheus.yml 中 rabbitmq job 一致
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Docker Socket 代理（仅开放容器重启权限，避免 API 容器直挂宿主机 Docker socket）
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: smsc-docker-proxy
    environment:
      CONTAINERS: 1
      POST: 1
      # 其余权限默认关闭（IMAGES/NETWORKS/VOLUMES/EXEC 等均为 0）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-api
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_GROUP_ID: ${TELEGRAM_ADMIN_GROUP_ID:-}
      DLR_CALLBACK_OPEN: ${DLR_CALLBACK_OPEN:-false}
      DLR_CALLBACK_TOKEN: ${DLR_CALLBACK_TOKEN:-}
      DLR_CALLBACK_IP_WHITELIST: ${DLR_CALLBACK_IP_WHITELIST:-}
      TELEGRAM_STAFF_API_SECRET: ${TELEGRAM_STAFF_API_SECRET:-}
      # 游客户服：无在职员工 tg_username 时 internal_bot 兜底跳转（与 Bot 侧 TELEGRAM_CS_FALLBACK_URL 可同值）
      TELEGRAM_CS_FALLBACK_URL: ${TELEGRAM_CS_FALLBACK_URL:-https://t.me/kaolachbot}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-https://www.kaolach.com}
      DOCKER_PROXY_URL: http://docker-proxy:2375
      SMPP_GATEWAY_PROBE_URL: ${SMPP_GATEWAY_PROBE_URL:-http://smpp-gateway:8090}
      SMPP_PROBE_TOKEN: ${SMPP_PROBE_TOKEN:-}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      # 工单附件存储：默认值是 path 拼接 bug 的产物（/data/tickets），显式指定容器内路径
      TICKET_UPLOAD_DIR: /app/data/tickets
      # 批次 CSV 上传：复用 import_uploads 命名卷
      BATCH_UPLOAD_DIR: /tmp/smsc_imports
    ports:
      - "127.0.0.1:8000:8000"   # API：仅本机；前端 nginx 经 docker network 内部访问
    volumes:
      - ./backend:/app
      # customer.py 等写入 /var/smsc/.cursor/，挂载后日志落在工作区而非仅容器内
      - ./.cursor:/var/smsc/.cursor
      - ./data:/app/data:ro
      - ./data/knowledge:/app/data/knowledge
      - ./data/tickets:/app/data/tickets
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
      # 私库异步上传：API 写临时文件与 Worker 读文件必须同卷，否则跨容器路径不可见
      - private_library_uploads:/tmp/smsc_pl_uploads
      - ./.env:/app/.env.host
    depends_on:
      mysql:
        condition: service_healthy
      proxysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      docker-proxy:
        condition: service_started
      smpp-gateway:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Celery Worker (短信发送)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
      DLR_PULL_HTTP_TIMEOUT_SECONDS: ${DLR_PULL_HTTP_TIMEOUT_SECONDS:-60}
      # OKCC 语音余额全量同步：Beat 调度，由此 Worker 执行（队列 integrations）
      OKCC_BEAT_SYNC_ENABLED: ${OKCC_BEAT_SYNC_ENABLED:-true}
      OKCC_BEAT_SYNC_INTERVAL_SECONDS: ${OKCC_BEAT_SYNC_INTERVAL_SECONDS:-300}
      # 批次巡检：Go 异步回写时放宽卡死/孤儿判定（分钟，与 batch_inspector 一致）
      BATCH_INSPECT_STUCK_MINUTES: ${BATCH_INSPECT_STUCK_MINUTES:-30}
      BATCH_INSPECT_SMPP_ORPHAN_MINUTES: ${BATCH_INSPECT_SMPP_ORPHAN_MINUTES:-30}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
      - private_library_uploads:/tmp/smsc_pl_uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${WORKER_CONCURRENCY:-8} --max-tasks-per-child=${WORKER_MAX_TASKS_PER_CHILD:-1000} -Q celery,data_tasks,webhook_tasks,integrations
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 专用：仅消费 sms_dlr（DLR 回执），与业务 worker 物理隔离，DLR 洪峰不影响 webhook/data 任务
  worker-dlr:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker-dlr
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      SMPP_PROBE_TOKEN: ${SMPP_PROBE_TOKEN:-}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${DLR_WORKER_CONCURRENCY:-8} --max-tasks-per-child=${DLR_WORKER_MAX_TASKS_PER_CHILD:-2000} -Q sms_dlr
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 专用：仅消费 sms_result_queue（Go SubmitSM 异步回写），与通用 worker 物理隔离，避免被 DLR/批量任务挤占
  worker-result:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker-result
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      SMPP_PROBE_TOKEN: ${SMPP_PROBE_TOKEN:-}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
      DLR_PULL_HTTP_TIMEOUT_SECONDS: ${DLR_PULL_HTTP_TIMEOUT_SECONDS:-60}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${RESULT_WORKER_CONCURRENCY:-12} --max-tasks-per-child=${RESULT_WORKER_MAX_TASKS_PER_CHILD:-2000} -Q sms_result_queue
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 专用短信发送 Worker（仅 sms_send，与数据/结算任务隔离）
  worker-sms:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-worker-sms
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      SMPP_PROBE_TOKEN: ${SMPP_PROBE_TOKEN:-}
      # submit_sm 等待 submit_sm_resp 最长时间（秒）；Compose 从项目根目录 .env 注入，见 SMPP_SUBMIT_RESP_WAIT_SECONDS
      SMPP_SUBMIT_RESP_WAIT_SECONDS: ${SMPP_SUBMIT_RESP_WAIT_SECONDS:-8}
      # 发送后保持 SMPP 连接秒数以便接收 deliver_sm（最大 86400；更久依赖 HTTP 拉取/回调）
      SMPP_DLR_SOCKET_HOLD_SECONDS: ${SMPP_DLR_SOCKET_HOLD_SECONDS:-300}
      DLR_SENT_TIMEOUT_HOURS: ${DLR_SENT_TIMEOUT_HOURS:-72}
      DLR_PULL_HTTP_TIMEOUT_SECONDS: ${DLR_PULL_HTTP_TIMEOUT_SECONDS:-60}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - import_uploads:/tmp/smsc_imports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # HTTP 通道高并发；SMPP 通道受连接限制需单独评估
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${SMS_WORKER_CONCURRENCY:-32} --max-tasks-per-child=${SMS_WORKER_MAX_TASKS_PER_CHILD:-2000} -Q sms_send
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Celery Beat (定时任务调度)
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smsc-beat
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      OKCC_BEAT_SYNC_ENABLED: ${OKCC_BEAT_SYNC_ENABLED:-true}
      OKCC_BEAT_SYNC_INTERVAL_SECONDS: ${OKCC_BEAT_SYNC_INTERVAL_SECONDS:-300}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Telegram Bot
  bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: smsc-bot
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-kaolachbot}
      TELEGRAM_ADMIN_GROUP_ID: ${TELEGRAM_ADMIN_GROUP_ID:-}
      STAFF_GROUP_ID: ${STAFF_GROUP_ID:-}
      API_BASE_URL: http://api:8000
      TELEGRAM_STAFF_API_SECRET: ${TELEGRAM_STAFF_API_SECRET:-}
      # 游客户服按钮：API 失败或未配置轮询员工时的 t.me 链接（须 https）
      TELEGRAM_CS_FALLBACK_URL: ${TELEGRAM_CS_FALLBACK_URL:-https://t.me/kaolachbot}
    volumes:
      - ./telegram_bot:/app
      - ./backend:/backend # 挂载 backend 代码以供复用
      - ./data/knowledge:/app/data/knowledge:ro # 业务知识附件供下载
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m bot.main
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 官网落地站快照（astercc518/kaolach）：供 Nginx 反代，替换原 Vue Landing 根路径体验
  landing-preview:
    build:
      context: ./deploy/landing-preview
      dockerfile: Dockerfile
    image: smsc-landing-preview:latest
    container_name: smsc-landing-preview
    environment:
      TZ: Asia/Shanghai
      PREVIEW_BIND: "0.0.0.0"
      PORT: "8787"
      PREVIEW_BRAND_NAME: kaolach
      LIVE_ORIGIN: "https://illyvoip.com"
      PREVIEW_PROXY_MISS: "1"
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smsc-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      landing-preview:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # Playwright 注水 Worker（无头浏览器自动点击/注册）
  worker-web:
    build:
      context: ./backend
      dockerfile: Dockerfile.playwright
    container_name: smsc-worker-web
    environment:
      TZ: Asia/Shanghai
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smsc_mq}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-smsc_mq_pass}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=prefork --concurrency=4 --max-tasks-per-child=${WEB_WORKER_MAX_TASKS_PER_CHILD:-500} -Q web_automation
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network

  # 高并发 Go SMPP 网关 (Phase 2 优化)
  smpp-gateway:
    build:
      context: ./go-smpp-gateway
      dockerfile: Dockerfile
    container_name: smsc-smpp-gateway
    environment:
      TZ: Asia/Shanghai
      DATABASE_HOST: proxysql
      DATABASE_PORT: 6033
      DATABASE_USER: ${MYSQL_USER:-smsuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-smspass123}
      DATABASE_NAME: ${MYSQL_DATABASE:-sms_system}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-smsc_mq}:${RABBITMQ_PASSWORD:-smsc_mq_pass}@rabbitmq:5672/
      # Go 网关消费 sms_send_smpp：并行 worker 数与 Rabbit QoS prefetch（与 channels.concurrency 配合调压）
      SMPP_GATEWAY_WORKERS: ${SMPP_GATEWAY_WORKERS:-32}
      SMPP_GATEWAY_PREFETCH: ${SMPP_GATEWAY_PREFETCH:-32}
      SMPP_PROBE_BIND_LISTEN: ${SMPP_PROBE_BIND_LISTEN:-:8090}
      SMPP_PROBE_TOKEN: ${SMPP_PROBE_TOKEN:-}
      # SMPP 入站服务器
      BACKEND_INTERNAL_URL: http://api:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      INBOUND_LISTEN: ${INBOUND_LISTEN:-:2775}
      INBOUND_SUBMIT_WORKERS: ${INBOUND_SUBMIT_WORKERS:-8}
      INBOUND_MAX_BINDS_PER_ACCOUNT: ${INBOUND_MAX_BINDS_PER_ACCOUNT:-5}
      INBOUND_MAX_CONNS_PER_IP: ${INBOUND_MAX_CONNS_PER_IP:-20}
      # DLR 归属过滤：与外部系统共用同一上游 SMPP 账号时启用，过滤掉别人的 DLR
      DLR_OWNERSHIP_FILTER: ${DLR_OWNERSHIP_FILTER:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "2775:2775"
    depends_on:
      proxysql:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    networks:
      - smsc-network


volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  import_uploads:
    driver: local
  private_library_uploads:
    driver: local
  proxysql_data:
    driver: local

networks:
  smsc-network:
    driver: bridge
