# 落地站 Node 上游（与 docker-compose 中 landing-preview 服务名一致）
upstream landing_preview {
    server landing-preview:8787;
}

# 默认 HTTP（直接 IP 访问时使用）
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 50m;
    # 后端健康检查（含 features.admin_private_library_*，便于确认 API 是否已含私库路由）
    location = /health {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        client_body_timeout 600s;
        
        # 针对上传优化的配置（大批量短信 JSON 等）
        client_max_body_size 500m;
        proxy_buffering off;
        gzip off;
    }
    # 避免 CDN/浏览器长期缓存旧 index.html，导致发版后仍加载旧 JS 包、侧栏缺项
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 域名 HTTP → HTTPS 重定向
server {
    listen 80;
    server_name kaolach.com www.kaolach.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name kaolach.com www.kaolach.com;

    # 大上传拉长等待；net::ERR_HTTP2_PING_FAILED 多发生在浏览器↔CDN 的 HTTP/2，需在 CDN 关闭 HTTP/2 或调大超时
    client_header_timeout 600s;

    ssl_certificate     /etc/nginx/certs/1.pem;
    ssl_certificate_key /etc/nginx/certs/1.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    client_max_body_size 50m;
    keepalive_timeout 650s;
    send_timeout 600s;

    location = /health {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 代理（勿对普通 REST 使用 Connection: upgrade，会干扰长连接/大上传）
    location /api {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        client_body_timeout 600s;

        # 针对上传优化的配置（大批量短信 JSON 等）
        client_max_body_size 500m;
        proxy_buffering off;
        gzip off;
    }

    # index.html 单独强禁止缓存（Cloudflare 等对 location / 的 header 可能不一致）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # /assets/ 同时被 Vite（控制台）与落地站快照（illyvoip pagespeed 等）使用：磁盘有则走本地 hash 包，否则交给落地站预览回源
    location ^~ /assets/ {
        try_files $uri @landing_assets;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        etag on;
    }
    location @landing_assets {
        internal;
        proxy_pass http://landing_preview$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # 不请求 gzip，便于 sub_filter 在明文正文上替换（落地站快照内链）
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        sub_filter_types text/html text/css application/javascript application/x-javascript;
        sub_filter_once off;
        sub_filter 'https://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter 'http://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter '//t.me/illyvoip_support_bot' '//t.me/kaolachbot';
        sub_filter 'https://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'http://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'https://api.whatsapp.com/send/?phone=38349537999' 'https://api.whatsapp.com/send/?phone=8613205051341';
        sub_filter 'https://api.whatsapp.com/send?phone=38349537999' 'https://api.whatsapp.com/send?phone=8613205051341';
        sub_filter 'phone=38349537999' 'phone=8613205051341';
        sub_filter 'tel:38349537999' 'tel:8613205051341';
    }
    location = /favicon.ico {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=86400";
        etag on;
    }
    location = /vite.svg {
        try_files $uri =404;
        expires 7d;
        etag on;
    }

    # 历史路径 /my、/my/… 不再走落地站预览，统一进入控制台登录页
    location ~* ^/my(/|$) {
        return 301 https://$host/login$is_args$args;
    }

    # 控制台 SPA：路径前缀与 frontend/src/router 对齐；其余走落地站快照（见 landing-preview 容器）
    location ~* ^/(login|dashboard|channels|reports|sales|account|data|sms|admin)(/|$) {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 落地站（GitHub astercc518/kaolach + preview-server.mjs）：/、/_catalog、/__preview/*、站内 HTML 等
    location / {
        proxy_pass http://landing_preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        sub_filter_types text/html text/css application/javascript application/x-javascript;
        sub_filter_once off;
        sub_filter 'https://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter 'http://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter '//t.me/illyvoip_support_bot' '//t.me/kaolachbot';
        sub_filter 'https://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'http://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'https://api.whatsapp.com/send/?phone=38349537999' 'https://api.whatsapp.com/send/?phone=8613205051341';
        sub_filter 'https://api.whatsapp.com/send?phone=38349537999' 'https://api.whatsapp.com/send?phone=8613205051341';
        sub_filter 'phone=38349537999' 'phone=8613205051341';
        sub_filter 'tel:38349537999' 'tel:8613205051341';
    }
}
