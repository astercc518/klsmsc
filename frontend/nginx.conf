# 落地站 Node 上游（与 docker-compose 中 landing-preview 服务名一致）
upstream landing_preview {
    server landing-preview:8787;
}

# 根据浏览器 Accept-Language 选择落地站语言（仅映射到已支持的语种，其余回退 en）
map $http_accept_language $landing_lang {
    default  "en";
    ~*^ja    "ja";
    ~*^es    "es";
    ~*^fr    "fr";
    ~*^de    "de";
    ~*^pt    "pt";
    ~*^hi    "hi";
    ~*^it    "it";
}

# 默认 HTTP（直接 IP 访问时使用）
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 50m;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 后端健康检查（含 features.admin_private_library_*，便于确认 API 是否已含私库路由）
    location = /health {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        client_body_timeout 600s;
        
        # 针对上传优化的配置（大批量短信 JSON 等）
        client_max_body_size 500m;
        proxy_buffering off;
        gzip off;
    }
    # 避免 CDN/浏览器长期缓存旧 index.html，导致发版后仍加载旧 JS 包、侧栏缺项
    location = /index.html {
        include /etc/nginx/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 域名 HTTP → HTTPS 重定向
server {
    listen 80;
    server_name kaolach.com www.kaolach.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name kaolach.com www.kaolach.com;

    # 大上传拉长等待；net::ERR_HTTP2_PING_FAILED 多发生在浏览器↔CDN 的 HTTP/2，需在 CDN 关闭 HTTP/2 或调大超时
    client_header_timeout 600s;

    ssl_certificate     /etc/nginx/certs/1.pem;
    ssl_certificate_key /etc/nginx/certs/1.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; script-src-elem 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-src 'self'; object-src 'none'; base-uri 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    client_max_body_size 50m;
    keepalive_timeout 650s;
    send_timeout 600s;

    location = /health {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 代理（勿对普通 REST 使用 Connection: upgrade，会干扰长连接/大上传）
    location /api {
        set $backend "http://api:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        client_body_timeout 600s;

        # 针对上传优化的配置（大批量短信 JSON 等）
        client_max_body_size 500m;
        proxy_buffering off;
        gzip off;
    }

    # index.html 单独强禁止缓存（Cloudflare 等对 location / 的 header 可能不一致）
    location = /index.html {
        include /etc/nginx/security_headers.conf;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; script-src-elem 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-src 'self'; object-src 'none'; base-uri 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # /assets/ 同时被 Vite（控制台）与落地站快照（illyvoip pagespeed 等）使用：磁盘有则走本地 hash 包，否则交给落地站预览回源
    location ^~ /assets/ {
        try_files $uri @landing_assets;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        etag on;
    }
    location @landing_assets {
        internal;
        proxy_pass http://landing_preview$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # 不请求 gzip，便于 sub_filter 在明文正文上替换（落地站快照内链）
        proxy_set_header Accept-Encoding "";
        proxy_set_header Accept-Language $landing_lang;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; script-src-elem 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; style-src-elem 'self' 'unsafe-inline' https:; img-src * data: blob:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https://www.youtube.com https://www.google.com https://www.facebook.com https://connect.facebook.net; object-src 'none'; base-uri 'self';" always;
        sub_filter_types text/html text/css application/javascript application/x-javascript;
        sub_filter_once off;
        # sitemap 中的 illyvoip.com URL 替换为 kaolach.com
        sub_filter 'https://illyvoip.com/' 'https://kaolach.com/';
        sub_filter 'https://illyvoip.com' 'https://kaolach.com';
        sub_filter 'https://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter 'http://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter '//t.me/illyvoip_support_bot' '//t.me/kaolachbot';
        sub_filter 'https://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'http://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'https://api.whatsapp.com/send/?phone=38349537999' 'https://api.whatsapp.com/send/?phone=8613205051341';
        sub_filter 'https://api.whatsapp.com/send?phone=38349537999' 'https://api.whatsapp.com/send?phone=8613205051341';
        sub_filter 'phone=38349537999' 'phone=8613205051341';
        sub_filter 'tel:38349537999' 'tel:8613205051341';
        sub_filter 'src="https://livechat.illyvoip.com' 'data-blocked-src="https://livechat.illyvoip.com';
        sub_filter "src='https://livechat.illyvoip.com" "data-blocked-src='https://livechat.illyvoip.com";
        sub_filter 'src="https://cdn-cookieyes.com' 'data-blocked-src="https://cdn-cookieyes.com';
        sub_filter "src='https://cdn-cookieyes.com" "data-blocked-src='https://cdn-cookieyes.com";
        sub_filter 'src="//cdn-cookieyes.com' 'data-blocked-src="//cdn-cookieyes.com';
        # 屏蔽 CookieYes <link rel="preload" href="..."> — href= 属性需单独处理
        sub_filter 'href="https://cdn-cookieyes.com' 'data-blocked-href="https://cdn-cookieyes.com';
        # 注入 createElement 拦截器：捕获 Chatwoot 内联 JS 动态创建的 script.src，
        # 将 livechat.illyvoip.com 的脚本静默丢弃（不发起任何请求，onload 不触发）。
        # 屏蔽国内被墙脚本（Facebook Pixel、doubleclick）+ illyvoip 客服：
        # 拦截 document.createElement("script").src 赋值，命中黑名单则静默丢弃
        sub_filter '</head>' '<style>[class^="cky-"],[class*=" cky-"],[id^="cky"]{display:none!important}</style><script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://kaolach.com/#org","name":"Kaolach","url":"https://kaolach.com","logo":{"@type":"ImageObject","url":"https://kaolach.com/kaolach-mark.png"},"description":"International bulk SMS gateway and VoIP service. Send SMS to 200+ countries, pay by Bitcoin or USDT.","contactPoint":{"@type":"ContactPoint","contactType":"sales","availableLanguage":["English","Chinese"],"url":"https://t.me/kaolachbot"},"sameAs":["https://t.me/kaolachbot"]},{"@type":"Service","@id":"https://kaolach.com/#sms","name":"International Bulk SMS Service","provider":{"@id":"https://kaolach.com/#org"},"description":"Global SMS messaging service supporting 200+ countries. High deliverability, real-time delivery reports, competitive pricing.","areaServed":"Worldwide","serviceType":"Bulk SMS"}]}</script><script>(function(){var bl=["livechat.illyvoip.com","connect.facebook.net","doubleclick.net","google-analytics.com","googletagmanager.com/gtag","googlesyndication.com"];var c=document.createElement.bind(document);document.createElement=function(t){var e=c(t);if((""+t).toLowerCase()==="script"){try{var s="";Object.defineProperty(e,"src",{get:function(){return s;},set:function(v){if(!v||!bl.some(function(d){return v.indexOf(d)!==-1;})){s=v;e.setAttribute("src",v);}},configurable:true});}catch(x){}}return e;};})();</script></head>';
        # 屏蔽 Facebook noscript 追踪像素（<img src="https://www.facebook.com/tr?...">）
        sub_filter 'src="https://www.facebook.com/tr?' 'data-blocked-src="https://www.facebook.com/tr?';
    }
    # robots.txt
    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        return 200 "User-agent: *\nAllow: /\nDisallow: /api/\nDisallow: /login\nDisallow: /dashboard\nDisallow: /admin\nDisallow: /account\nSitemap: https://kaolach.com/sitemap.xml\n";
    }

    # sitemap.xml：直接返回 kaolach.com 页面列表，不依赖上游（上游 sitemap 里全是 illyvoip.com URL）
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        return 200 '<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
<url><loc>https://kaolach.com/</loc><changefreq>weekly</changefreq><priority>1.0</priority></url>
<url><loc>https://kaolach.com/sms-messaging</loc><changefreq>monthly</changefreq><priority>0.9</priority></url>
<url><loc>https://kaolach.com/voice-termination</loc><changefreq>monthly</changefreq><priority>0.8</priority></url>
<url><loc>https://kaolach.com/phone-numbers</loc><changefreq>monthly</changefreq><priority>0.8</priority></url>
<url><loc>https://kaolach.com/toll-free-numbers</loc><changefreq>monthly</changefreq><priority>0.7</priority></url>
<url><loc>https://kaolach.com/global-data-services</loc><changefreq>monthly</changefreq><priority>0.7</priority></url>
<url><loc>https://kaolach.com/solutions/businesses</loc><changefreq>monthly</changefreq><priority>0.7</priority></url>
<url><loc>https://kaolach.com/solutions/call-centers-helpdesk</loc><changefreq>monthly</changefreq><priority>0.6</priority></url>
<url><loc>https://kaolach.com/solutions/carrier-voice-termination</loc><changefreq>monthly</changefreq><priority>0.6</priority></url>
<url><loc>https://kaolach.com/solutions/wholesale-voice-termination</loc><changefreq>monthly</changefreq><priority>0.6</priority></url>
</urlset>';
    }

    location = /favicon.ico {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=86400";
        etag on;
    }
    location = /favicon.svg {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        etag on;
    }
    location = /vite.svg {
        try_files $uri =404;
        expires 7d;
        etag on;
    }
    location = /kaolach-wordmark.svg {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        etag on;
    }
    location = /kaolach-mark.png {
        try_files $uri =404;
        expires 7d;
        etag on;
    }

    # 历史路径 /my、/my/… 不再走落地站预览，统一进入控制台登录页
    location ~* ^/my(/|$) {
        return 301 https://$host/login$is_args$args;
    }

    # 控制台 SPA：路径前缀与 frontend/src/router 对齐；其余走落地站快照（见 landing-preview 容器）
    location ~* ^/(login|dashboard|channels|reports|sales|account|data|sms|admin)(/|$) {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/security_headers.conf;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 落地站（GitHub astercc518/kaolach + preview-server.mjs）：/、/_catalog、/__preview/*、站内 HTML 等
    # 注意：location 块内有 add_header 时会覆盖上层所有继承头，必须在此重写全部安全响应头。
    # 落地页是第三方快照内容（illyvoip.com），内含大量内联脚本与外部 CDN 资源，
    # CSP 需比控制台宽松；但 livechat.illyvoip.com 在此明确屏蔽（frame-src 不列入 + sub_filter）。
    location / {
        proxy_pass http://landing_preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        # 强制英文：覆盖浏览器 Accept-Language，避免上游按中文/其他语言返回快照
        proxy_set_header Accept-Language $landing_lang;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;

        # 落地页允许 Cloudflare 缓存（屏蔽上游 Node 设的 private，覆盖为可缓存）
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
        # Canonical：告知 Google 本页权威 URL 是 kaolach.com（避免与 illyvoip.com 重复内容判定）
        add_header Link '<https://kaolach.com$uri>; rel="canonical"' always;

        # 安全响应头（覆盖服务器级，保持其余策略一致）
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # 落地页 CSP：允许内联脚本/样式（快照页面大量使用）、外部 HTTPS 资源；
        # livechat.illyvoip.com 不列入 frame-src（配合下方 sub_filter 屏蔽 illyvoip 客服）。
        add_header Content-Security-Policy "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; script-src-elem 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; style-src-elem 'self' 'unsafe-inline' https:; img-src * data: blob:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https://www.youtube.com https://www.google.com https://www.facebook.com https://connect.facebook.net; object-src 'none'; base-uri 'self';" always;

        sub_filter_types text/html text/css application/javascript application/x-javascript;
        sub_filter_once off;
        # sitemap 中的 illyvoip.com URL 替换为 kaolach.com
        sub_filter 'https://illyvoip.com/' 'https://kaolach.com/';
        sub_filter 'https://illyvoip.com' 'https://kaolach.com';
        sub_filter 'https://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter 'http://t.me/illyvoip_support_bot' 'https://t.me/kaolachbot';
        sub_filter '//t.me/illyvoip_support_bot' '//t.me/kaolachbot';
        sub_filter 'https://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'http://wa.me/38349537999' 'https://wa.me/8613205051341';
        sub_filter 'https://api.whatsapp.com/send/?phone=38349537999' 'https://api.whatsapp.com/send/?phone=8613205051341';
        sub_filter 'https://api.whatsapp.com/send?phone=38349537999' 'https://api.whatsapp.com/send?phone=8613205051341';
        sub_filter 'phone=38349537999' 'phone=8613205051341';
        sub_filter 'tel:38349537999' 'tel:8613205051341';
        # 屏蔽 illyvoip Chatwoot 客服：将 script/iframe 的 src= 改成 data-blocked-src=，
        # 浏览器不会尝试加载，彻底消除 ERR_NAME_NOT_RESOLVED 与 frame-src CSP 报错。
        sub_filter 'src="https://livechat.illyvoip.com' 'data-blocked-src="https://livechat.illyvoip.com';
        sub_filter "src='https://livechat.illyvoip.com" "data-blocked-src='https://livechat.illyvoip.com";
        # 屏蔽 CookieYes：同样移除 src 属性使脚本不执行（配合 CSS display:none 彻底清除）
        sub_filter 'src="https://cdn-cookieyes.com' 'data-blocked-src="https://cdn-cookieyes.com';
        sub_filter "src='https://cdn-cookieyes.com" "data-blocked-src='https://cdn-cookieyes.com";
        sub_filter 'src="//cdn-cookieyes.com' 'data-blocked-src="//cdn-cookieyes.com';
        # 屏蔽 CookieYes <link rel="preload" href="..."> — href= 属性需单独处理
        sub_filter 'href="https://cdn-cookieyes.com' 'data-blocked-href="https://cdn-cookieyes.com';
        # 注入 createElement 拦截器：捕获 Chatwoot 内联 JS 动态创建的 script.src，
        # 将 livechat.illyvoip.com 的脚本静默丢弃（不发起任何请求，onload 不触发）。
        # 屏蔽国内被墙脚本（Facebook Pixel、doubleclick）+ illyvoip 客服：
        # 拦截 document.createElement("script").src 赋值，命中黑名单则静默丢弃
