<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="kg" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34b1a2"/>
      <stop offset="100%" stop-color="#1f7a70"/>
    </linearGradient>
  </defs>

  <!-- 圆角底板 -->
  <rect width="64" height="64" rx="14" fill="url(#kg)"/>

  <!-- 抽象考拉 = 聊天气泡（单一白色剪影） -->
  <g fill="#ffffff">
    <!-- 左耳 -->
    <circle cx="19" cy="20" r="10"/>
    <!-- 右耳 -->
    <circle cx="45" cy="20" r="10"/>
    <!-- 脸 / 气泡主体 + 左下气泡尾 -->
    <path d="
      M 12 28
      Q 12 22 18 22
      L 46 22
      Q 52 22 52 28
      L 52 42
      Q 52 48 46 48
      L 24 48
      L 14 56
      L 18 48
      Q 12 48 12 42
      Z
    "/>
  </g>

  <!-- 鼻头（点睛之笔，让袋拉感觉立住） -->
  <ellipse cx="32" cy="36" rx="4" ry="3" fill="#1f7a70"/>
</svg>
