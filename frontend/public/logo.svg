<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="sea-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="sail" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- 地球轮廓 -->
  <g fill="none" stroke="#93c5fd" stroke-width="3" opacity="0.6">
    <ellipse cx="256" cy="256" rx="180" ry="90"/>
    <ellipse cx="256" cy="256" rx="90" ry="180"/>
    <path d="M76 256 Q256 180 436 256 Q256 332 76 256"/>
    <path d="M76 256 Q256 332 436 256"/>
  </g>

  <!-- 上升箭头 -->
  <path d="M380 120 L420 160 L400 160 L400 220 L360 220 L360 160 L340 160 Z" 
        fill="#60a5fa" opacity="0.7"/>

  <!-- 波浪 -->
  <g fill="none" stroke="#1e40af" stroke-width="8" stroke-linecap="round" opacity="0.9">
    <path d="M0 420 Q128 380 256 420 T512 420" stroke="#2563eb"/>
    <path d="M0 450 Q128 410 256 450 T512 450" stroke="#3b82f6"/>
    <path d="M0 480 Q128 440 256 480 T512 480" stroke="#60a5fa"/>
  </g>

  <!-- 帆船 -->
  <g transform="translate(180, 140)">
    <!-- 船身 -->
    <path d="M20 120 L40 160 L160 160 L180 120 Z" fill="#1e3a5f"/>
    <!-- 桅杆 -->
    <line x1="100" y1="160" x2="100" y2="20" stroke="#1e3a5f" stroke-width="4"/>
    <!-- 帆 -->
    <path d="M100 25 L100 155 L220 100 Z" fill="url(#sail)"/>
    <circle cx="160" cy="70" r="12" fill="#fff"/>
    <!-- 旗 -->
    <path d="M100 20 L130 35 L100 50 Z" fill="#1e3a5f"/>
    <!-- 考拉 -->
    <g transform="translate(45, 75)">
      <!-- 耳朵 -->
      <circle cx="0" cy="-15" r="18" fill="#9ca3af"/>
      <circle cx="50" cy="-15" r="18" fill="#9ca3af"/>
      <circle cx="0" cy="-15" r="10" fill="#e5e7eb"/>
      <circle cx="50" cy="-15" r="10" fill="#e5e7eb"/>
      <!-- 脸 -->
      <ellipse cx="25" cy="15" rx="28" ry="32" fill="#9ca3af"/>
      <!-- 眼睛 -->
      <ellipse cx="15" cy="10" rx="6" ry="8" fill="#374151"/>
      <ellipse cx="35" cy="10" rx="6" ry="8" fill="#374151"/>
      <circle cx="16" cy="8" r="2" fill="#fff"/>
      <circle cx="36" cy="8" r="2" fill="#fff"/>
      <!-- 鼻子 -->
      <ellipse cx="25" cy="22" rx="5" ry="6" fill="#374151"/>
      <!-- 嘴 -->
      <path d="M20 30 Q25 36 30 30" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 文字：考拉出海 -->
  <text x="256" y="380" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="700" fill="#1e3a5f" text-anchor="middle">考拉出海</text>
  <!-- 英文 -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#2563eb" text-anchor="middle" letter-spacing="2">KOALA GOING OVERSEAS</text>
</svg>
